<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>More Data Fast — Widget Library</title>
<link rel="stylesheet" href="../dashboard/kit.css"/>
<style>
  .wl-head{padding:24px 20px 8px}
  .wl-head h1{font-family:var(--mdf-font-display);font-size:40px;line-height:1.05;letter-spacing:-.01em;margin:0;color:var(--mdf-fg-1);font-weight:400}
  .wl-head p{font-size:14px;color:var(--mdf-fg-2);margin:4px 0 0;max-width:560px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="app"></div>
<script type="text/babel" src="../dashboard/Widget.jsx"></script>
<script type="text/babel" src="../dashboard/Charts.jsx"></script>
<script type="text/babel" src="../dashboard/Feeds.jsx"></script>
<script type="text/babel" src="Gallery.jsx"></script>
<script type="text/babel">
function App(){
  return (
    <div data-screen-label="Widget Library">
      <div className="wl-head">
        <h1>Widget library</h1>
        <p>Every chart type, ready to drop into a dashboard. KPIs, time series, distributions, flows, financials, maps.</p>
      </div>
      <WidgetGallery/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
