<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>More Data Fast — Dashboard</title>
<link rel="stylesheet" href="kit.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="app"></div>
<script type="text/babel" src="Topbar.jsx"></script>
<script type="text/babel" src="Widget.jsx"></script>
<script type="text/babel" src="Charts.jsx"></script>
<script type="text/babel" src="Feeds.jsx"></script>
<script type="text/babel" src="Settings.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [view, setView] = useState("dashboard");
  const [hidden, setHidden] = useState({});
  const hide = k => setHidden(h => ({...h, [k]:true}));
  const isHidden = k => !!hidden[k];

  if (view === "settings") return (
    <div data-screen-label="Settings">
      <Topbar onOpenSettings={() => setView("dashboard")} />
      <Settings onBack={() => setView("dashboard")} />
    </div>
  );

  return (
    <div data-screen-label="Dashboard">
      <Topbar onOpenSettings={() => setView("settings")} />
      <div className="mdf-grid">
        <div className="mdf-grid__add">
          <button className="mdf-addbtn">+ Add widget</button>
        </div>

        {!isHidden("kpis") && <KpiStripWidget onClose={() => hide("kpis")} />}

        {!isHidden("devices") && (
          <Widget title="Devices" span={3} onClose={() => hide("devices")}>
            <DonutChart />
          </Widget>
        )}
        {!isHidden("cities") && (
          <Widget title="Cities" span={3} onClose={() => hide("cities")}>
            <CitiesList />
          </Widget>
        )}
        {!isHidden("events") && (
          <Widget title="Live events feed" span={3} onClose={() => hide("events")}>
            <LiveEvents />
          </Widget>
        )}
        {!isHidden("payments") && (
          <Widget title="Live payments feed" span={3} onClose={() => hide("payments")}>
            <LivePaymentsEmpty />
          </Widget>
        )}

        {!isHidden("visitors") && (
          <Widget title="Visitors over time" span={4} onClose={() => hide("visitors")}>
            <div className="mdf-kpi__label">VISITORS OVER TIME <span style={{float:"right"}}>DAY</span></div>
            <div style={{fontFamily:"var(--mdf-font-display)",fontSize:32,lineHeight:1,color:"var(--mdf-fg-1)",margin:"6px 0 10px"}}>165</div>
            <div style={{flex:1,minHeight:120}}>
              <AreaChart data={[30,42,35,55,48,62,50,44,58,52,42]} labels={["15 Apr","17 Apr","19 Apr","21 Apr"]} height={140}/>
            </div>
          </Widget>
        )}
        {!isHidden("events2") && (
          <Widget title="Live events feed" span={4} onClose={() => hide("events2")}>
            <LiveEvents />
          </Widget>
        )}
        {!isHidden("campaigns") && (
          <Widget title="Top campaigns" span={4} onClose={() => hide("campaigns")}>
            <TopCampaigns />
          </Widget>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
