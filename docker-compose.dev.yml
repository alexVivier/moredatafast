services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: datafast
      POSTGRES_PASSWORD: datafast
      POSTGRES_DB: datafast
    ports:
      - "5433:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datafast -d datafast"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata-dev:
